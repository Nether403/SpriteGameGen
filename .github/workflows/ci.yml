name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up active LTS Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify backend lockfile
        run: uv lock --check
        working-directory: backend

      - name: Install locked backend dependencies
        run: uv sync --locked --extra dev
        working-directory: backend

      - name: Test backend
        run: uv run pytest
        working-directory: backend

      - name: Check backend dependency compatibility
        run: uv pip check
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test frontend
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Audit production frontend dependencies
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend
