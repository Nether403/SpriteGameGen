name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up active LTS Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify backend lockfile
        run: uv lock --check
        working-directory: backend

      - name: Install locked backend dependencies
        run: uv sync --locked --extra dev
        working-directory: backend

      - name: Test backend
        run: uv run pytest
        working-directory: backend

      - name: Check backend dependency compatibility
        run: uv pip check
        working-directory: backend

      - name: Check runtime dependency licenses
        run: uv run python ../scripts/check_dependency_licenses.py
        working-directory: backend

      - name: Run credential-safe readiness doctor
        run: uv run python ../scripts/doctor.py
        working-directory: backend

      - name: Smoke test MCP stdio contract
        run: uv run python ../scripts/smoke_mcp.py
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test frontend
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Audit production frontend dependencies
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - name: Scan tracked history with redacted output
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_ENABLE_SUMMARY: "false"

  godot:
    name: Godot 4.7 bundle smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install locked backend dependencies
        run: uv sync --locked --extra dev
        working-directory: backend
      - name: Install pinned Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false
      - name: Import and load generated resources headlessly
        run: uv run python ../scripts/run_godot_smoke.py --godot godot
        working-directory: backend
